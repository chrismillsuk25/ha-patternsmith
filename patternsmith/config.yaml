name: PatternSmith
version: "0.1.0"
slug: patternsmith
description: Suggest Home Assistant automations by learning repeated manual actions
url: "https://github.com/chrismillsuk25/ha-patternsmith"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:brain
panel_title: PatternSmith
homeassistant_api: true
hassio_api: true
hassio_role: default
map:
  - addon_config:rw
options:
  log_level: info
  retention_days: 30
  lookback_seconds: 120
  min_repetitions: 3
  include_domains:
    - light
    - switch
    - fan
    - binary_sensor
    - sensor
  safe_action_domains:
    - light
    - switch
    - fan
  exclude_entities: []
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  retention_days: int(1,365)
  lookback_seconds: int(10,3600)
  min_repetitions: int(2,100)
  include_domains:
    - str
  safe_action_domains:
    - str
  exclude_entities:
    - str
